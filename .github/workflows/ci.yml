name: Auto Key Checker

on:
  schedule:
    - cron: '0 */6 * * *'  # Увеличено до 6 часов — меньше нагрузка
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 350 минут — избыточно для чекера

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
        # НЕ ставь continue-on-error: true здесь!
        # Если checkout упал — дальше бессмысленно

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 3.9 устарел, лучше 3.11
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Checker Script
        run: python main.py
        timeout-minutes: 45
        env:
          PYTHONUNBUFFERED: '1'  # Видеть логи в реальном времени

      - name: Commit & Push Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update checked keys"
          file_pattern: "checked/*"
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
