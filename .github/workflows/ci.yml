name: Auto Key Checker

on:
  schedule:
    - cron: '0 */6 * * *'  # каждые 6 часов
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 1) mirror.py — обновляет githubmirror/*
      - name: Update githubmirror (mirror.py)
        run: python mirror.py
        timeout-minutes: 30
        env:
          PYTHONUNBUFFERED: '1'

      # 2) debug-вывод: есть ли изменения в githubmirror
      - name: Debug git status after mirror
        run: |
          echo "=== git status (short) ==="
          git status -sb
          echo ""
          echo "=== changed files under githubmirror ==="
          git status --porcelain githubmirror || true
          echo ""
          echo "=== list githubmirror tree ==="
          ls -R githubmirror || true

      # 3) основной чекер (checked/*)
      - name: Run Checker Script
        run: python main.py
        timeout-minutes: 45
        env:
          PYTHONUNBUFFERED: '1'

      # 4) ещё один debug перед коммитом — вдруг main что-то тоже тронул
      - name: Debug git status before commit
        run: |
          echo "=== git status (short) BEFORE COMMIT ==="
          git status -sb
          echo ""
          echo "=== changed files under githubmirror & checked ==="
          git status --porcelain githubmirror checked || true

      - name: Commit & Push Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update checked & githubmirror"
          file_pattern: |
            checked/*
            githubmirror/*
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"


