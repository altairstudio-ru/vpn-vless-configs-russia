name: VPN ALL-RAW nofilter

on:
  schedule:
    - cron: "0 */12 * * *"    # раз в 12 часов
  workflow_dispatch:

jobs:
  all_raw:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Run mirror_all_raw
        run: |
          python mirror_all_raw.py

      - name: Commit & push ALL-RAW
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add githubmirror/clean_nofilter_all githubmirror/new || true
          git commit -m "Update ALL-RAW nofilter" || exit 0
          git push
