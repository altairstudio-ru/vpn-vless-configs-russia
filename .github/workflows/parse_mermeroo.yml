name: Parse mermeroo SUB LINKS

on:
  workflow_dispatch:        # запуск руками из Actions
  schedule:
    - cron: "0 */6 * * *"   # каждые 6 часов (по UTC)

jobs:
  run-parser:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # нужно, чтобы пушить изменения

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run parser
        run: |
          python parse_mermeroo.py

      - name: Commit & push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mermeroo_sources.txt
          git diff --cached --quiet || git commit -m "Update mermeroo_sources"
          git push
