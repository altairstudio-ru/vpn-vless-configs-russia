name: Convert extra mermeroo sources

on:
  workflow_dispatch:

jobs:
  convert-extra:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Convert extra sources to URI list
        run: |
          python convert_extra_sources.py

      - name: Commit & push converted list
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add extra_converted_for_mirror.txt
          git diff --cached --quiet || git commit -m "Update extra converted sources"
          git push
